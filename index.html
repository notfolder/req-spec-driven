<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background-color: #f4f4f9;
        }

        h1 {
            color: #333;
        }

        #game-board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 5px;
            margin: 20px 0;
            background-color: #ccc;
            padding: 5px;
            border-radius: 10px;
        }

        .cell {
            background-color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 48px;
            cursor: pointer;
            border: 3px solid #aaa;
            transition: background-color 0.2s, transform 0.1s;
        }

        .cell:hover {
            background-color: #e0e0ff;
        }

        /* スタイル定義 */
        .x-mark {
            color: #ff5722; /* オレンジ系 */
        }
        .o-mark {
            color: #2196f3; /* 青系 */
        }
        
        #game-status {
            font-size: 24px;
            margin-bottom: 20px;
            min-height: 30px;
        }

        #reset-button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        #reset-button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <h1>Tic Tac Toe (三目並べ)</h1>
    
    <div id="game-status">Player X's Turn</div>
    
    <div id="game-board">
        <!-- Cells will be generated by JavaScript -->
    </div>

    <button id="reset-button" onclick="resetGame()">リセット</button>

    <script>
        const board = document.getElementById('game-board');
        const statusDisplay = document.getElementById('game-status');
        let gameState = ["", "", "", "", "", "", "", "", ""]; // Represents the 9 cells in order
        let currentPlayer = 'X';
        let gameActive = true;

        // --- Game Logic Functions ---

        // セルを生成し、イベントリスナーを設定する関数
        function createBoard() {
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.setAttribute('data-index', i);
                // クリックイベントリスナーを追加
                cell.addEventListener('click', handleCellClick);
                board.appendChild(cell);
            }
        }

        // セルがクリックされたときの処理ハンドラ
        function handleCellClick(event) {
            const clickedCell = event.target;
            const clickedIndex = parseInt(clickedCell.getAttribute('data-index'));

            // すでに値が入っているセルか、ゲームがアクティブでない場合は何もしない
            if (gameState[clickedIndex] !== "" || !gameActive) {
                return;
            }

            // セルに現在のプレイヤーのマークを入れる
            makeMove(clickedCell, clickedIndex);
        }

        // 実際にムーブを行う関数
        function makeMove(cellElement, index) {
            gameState[index] = currentPlayer;
            cellElement.innerHTML = currentPlayer === 'X' ? 'X' : 'O';
            cellElement.classList.add(currentPlayer === 'X' ? 'x-mark' : 'o-mark');

            // 勝敗判定を行う
            if (checkWin()) {
                statusDisplay.textContent = `🎉 プレイヤー ${currentPlayer} の勝利です！ 🎉`;
                gameActive = false;
                return;
            } else if (gameState.every(cell => cell !== "")) {
                // 全てのマスが埋まった場合（引き分け）
                statusDisplay.textContent = "🤝 引き分けです！ 🤝";
                gameActive = false;
                return;
            }

            // 次のプレイヤーへターンを渡す
            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            updateStatus();
        }

        // 勝敗判定ロジック
        function checkWin() {
            // 勝利パターン (インデックスの組み合わせ)
            const winConditions = [
                [0, 1, 2], // 横 1
                [3, 4, 5], // 横 2
                [6, 7, 8], // 横 3
                [0, 3, 6], // 縦 1
                [1, 4, 7], // 縦 2
                [2, 5, 8], // 縦 3
                [0, 4, 8], // 斜め 1
                [2, 4, 6]  // 斜め 2
            ];

            for (let i = 0; i < winConditions.length; i++) {
                const [a, b, c] = winConditions[i];
                if (gameState[a] && gameState[a] === gameState[b] && gameState[a] === gameState[c]) {
                    // 勝利したマスをハイライト表示する追加ロジックが必要であればここに追加
                    return true;
                }
            }
            return false;
        }

        // ステータス表示の更新
        function updateStatus() {
            if (gameActive) {
                statusDisplay.textContent = `現在 ${currentPlayer} のターンです。`;
            }
        }

        // ゲームのリセット処理
        window.resetGame = function() {
            gameState = ["", "", "", "", "", "", "", "", ""];
            gameActive = true;
            currentPlayer = 'X';

            // 全てのセルをクリアする
            document.querySelectorAll('.cell').forEach(cell => {
                cell.innerHTML = "";
                cell.className = 'cell'; // クラス名をリセット
            });

            updateStatus();
        }


        // ページロード時に実行
        window.onload = function() {
            createBoard();
            updateStatus(); // 初期ステータス表示
        };

    </script>

</body>
</html>
