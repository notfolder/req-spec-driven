services:
  backend:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "pip install -r requirements.txt && uvicorn src.backend.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

  nginx:
    image: nginx:1.27
    depends_on:
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./src/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./src/frontend:/usr/share/nginx/html:ro

  test_playwright:
    image: mcr.microsoft.com/playwright:v1.55.0-jammy
    depends_on:
      - backend
      - nginx
    working_dir: /app/e2e
    volumes:
      - ./:/app
    command: >
      sh -lc "
      node -e \"const http=require('http');let n=0;const ping=()=>{const req=http.get('http://nginx/api/health',res=>{if(res.statusCode===200){process.exit(0)};retry()});req.on('error',retry)};const retry=()=>{n+=1;if(n>60){process.exit(1)};setTimeout(ping,1000)};ping();\" &&
      npm ci &&
      npx playwright test -c playwright.docker.config.ts
      "
